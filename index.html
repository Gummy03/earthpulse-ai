<!DOCTYPE html>
<html>
<head>
<title>EarthPulse AI</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="cesiumContainer"></div>

<div class="hud-grid"></div>
<div class="radar-sweep"></div>

<div class="top-bar glow">EARTHPULSE AI — GLOBAL INTEL NETWORK</div>

<div class="left-panel panel">
<h3>ANOMALY FEED</h3>
<div id="alerts"></div>
</div>
<div class="minimap panel">
<h3>MINIMAP</h3>
<div id="miniMap"></div>
</div>

<div class="right-panel panel">
<h3>SYSTEM STATUS</h3>
<div id="stats">Anomalies: 0</div>
<div class="indicator online">● ONLINE</div>
<div class="indicator secure">● SECURE</div>
<div class="indicator danger">● THREAT LEVEL: LOW</div>
</div>

<div class="bottom-bar glow">SYSTEM ACTIVE</div>

<div class="console panel">
<h3>TERMINAL</h3>
<div class="terminal-log">> Boot sequence initialized...</div>
</div>

<div class="legend panel">
<h3>LEGEND</h3>
<div class="legend-item red"></div> Major anomaly  
<div class="legend-item orange"></div> Medium anomaly  
<div class="legend-item yellow"></div> Minor anomaly
</div>

<script src="js/app.js"></script>
</body>
</html>
